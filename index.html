<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다은이의 테트리스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        :root {
            --pink-soft: #ffe5ec;      /* 더 연한 파스텔 핑크 */
            --blue-soft: #e0f2fe;      /* 더 연한 파스텔 하늘색 */
            --blue-medium: #bae6fd;    /* 부드러운 하늘색 */
            --text-color: #8da9b6;     /* 차분한 파스텔 블루 그레이 */
            --white: #ffffff;
        }

        body {
            background-color: #fdfeff;
            touch-action: none;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            color: var(--text-color);
        }
        
        #game-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #ffffff 0%, #f0f9ff 100%);
        }
        
        .game-main-row {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 10px;
        }

        /* 고양이 영역 */
        .cat-area {
            width: 120px;
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 60px 60px 30px 30px;
            padding-bottom: 20px;
            border: 2px dashed var(--blue-soft);
        }

        #cat-svg {
            width: 100%;
            height: 100%;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cat-body-part {
            fill: var(--white);
            stroke: var(--blue-medium);
            stroke-width: 2;
        }

        .cat-eye { fill: #6a8d9d; }
        .cat-nose { fill: #ffccd5; }
        .cat-blush { fill: #ffe5ec; opacity: 0.8; }
        .cat-jelly { fill: #ffccd5; }

        .heart {
            fill: #ffccd5;
            display: none;
            animation: floatUp 2s infinite ease-out;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6); opacity: 0.8; }
            100% { transform: translateY(-70px) scale(1.4); opacity: 0; }
        }

        canvas {
            border: 8px solid var(--blue-soft);
            background-color: var(--white);
            max-height: 50vh;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(186, 230, 253, 0.2);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            width: 90%;
            max-width: 380px;
        }

        .btn {
            background-color: var(--white);
            color: var(--text-color);
            padding: 14px;
            border-radius: 20px;
            text-align: center;
            font-size: 1.3rem;
            border: 2px solid var(--blue-soft);
            border-bottom: 5px solid var(--blue-soft);
            user-select: none;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .btn-large {
            grid-column: span 3;
            background-color: var(--blue-medium);
            color: var(--white);
            border: none;
            border-bottom: 5px solid #90d8f7;
        }
        
        #info-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .info-box {
            color: var(--text-color);
            font-size: 1.4rem;
            background: var(--white);
            padding: 8px 25px;
            border-radius: 30px;
            border: 2px solid var(--blue-soft);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .start-ui {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 40px;
            border: 4px solid var(--blue-soft);
            text-align: center;
            box-shadow: 0 20px 40px rgba(186, 230, 253, 0.2);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="info-panel">
        <div class="info-box">점수: <span id="score">0</span></div>
        <div class="info-box">레벨: <span id="level">1</span></div>
    </div>
    
    <div class="game-main-row">
        <div class="cat-area">
            <svg id="cat-svg" viewBox="0 0 100 200">
                <path id="cat-tail" class="cat-body-part" d="M 65 180 Q 85 180 85 155" fill="none" stroke-linecap="round" />
                <path id="cat-body" class="cat-body-part" d="M 30 185 Q 30 150 50 150 Q 70 150 70 185 L 70 190 Q 50 195 30 190 Z" />
                <circle id="jelly-l" class="cat-jelly" cx="40" cy="188" r="3" />
                <circle id="jelly-r" class="cat-jelly" cx="60" cy="188" r="3" />
                <g id="cat-head-group">
                    <circle id="cat-head" class="cat-body-part" cx="50" cy="140" r="22" />
                    <path id="ear-l" class="cat-body-part" d="M 32 128 Q 25 105 40 122 Z" />
                    <path id="ear-r" class="cat-body-part" d="M 68 128 Q 75 105 60 122 Z" />
                    <circle id="eye-l" class="cat-eye" cx="42" cy="142" r="2.5" />
                    <circle id="eye-r" class="cat-eye" cx="58" cy="142" r="2.5" />
                    <circle class="cat-blush" cx="35" cy="148" r="4" />
                    <circle class="cat-blush" cx="65" cy="148" r="4" />
                    <path class="cat-nose" d="M 48 148 L 52 148 L 50 150 Z" />
                </g>
                <path class="heart h1" d="M 20 80 Q 20 75 25 75 Q 30 75 30 80 Q 30 85 25 90 Q 20 85 20 80" />
            </svg>
        </div>

        <canvas id="tetris"></canvas>
    </div>

    <div class="controls">
        <div class="btn" id="left">◀</div>
        <div class="btn" id="rotate">회전</div>
        <div class="btn" id="right">▶</div>
        <div class="btn btn-large" id="down">빨리 내리기!</div>
    </div>

    <div id="overlay">
        <div class="start-ui">
            <h1 class="text-3xl font-bold mb-4" style="color: var(--text-color);">다은이의 테트리스</h1>
            <p class="mb-8 opacity-70 text-base">300점마다 속도가 빨라져요!</p>
            <button id="start-btn" class="bg-white hover:bg-blue-50 px-12 py-4 rounded-full font-bold text-xl transition-all shadow-sm active:scale-95" style="color: var(--text-color); border: 2px solid var(--blue-soft);">
                시작하기
            </button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');

    const ROWS = 20;
    const COLS = 10;
    
    let BLOCK_SIZE;
    function resizeCanvas() {
        const h = window.innerHeight * 0.50;
        BLOCK_SIZE = Math.floor(h / ROWS);
        canvas.width = COLS * BLOCK_SIZE;
        canvas.height = ROWS * BLOCK_SIZE;
        context.setTransform(1, 0, 0, 1, 0, 0);
        context.scale(BLOCK_SIZE, BLOCK_SIZE);
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createPiece(type) {
        if (type === 'I') return [[0, 1, 0, 0],[0, 1, 0, 0],[0, 1, 0, 0],[0, 1, 0, 0]];
        else if (type === 'L') return [[0, 2, 0],[0, 2, 0],[0, 2, 2]];
        else if (type === 'J') return [[0, 3, 0],[0, 3, 0],[3, 3, 0]];
        else if (type === 'O') return [[4, 4],[4, 4]];
        else if (type === 'Z') return [[5, 5, 0],[0, 5, 5],[0, 0, 0]];
        else if (type === 'S') return [[0, 6, 6],[6, 6, 0],[0, 0, 0]];
        else if (type === 'T') return [[0, 7, 0],[7, 7, 7],[0, 0, 0]];
    }

    const colors = [
        null, 
        '#fbcfe8', // 핑크 (I)
        '#bae6fd', // 하늘 (L)
        '#ddd6fe', // 연보라 (J)
        '#fef3c7', // 크림 노랑 (O)
        '#fecaca', // 살구 (Z)
        '#bbf7d0', // 민트 (S)
        '#f9a8d4', // 장미 (T)
    ];

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function draw() {
        context.fillStyle = '#ffffff';
        context.fillRect(0, 0, canvas.width, canvas.height);
        
        context.strokeStyle = 'rgba(224, 242, 254, 0.3)';
        context.lineWidth = 0.03;
        for(let i=0; i<=COLS; i++) {
            context.beginPath();
            context.moveTo(i, 0);
            context.lineTo(i, ROWS);
            context.stroke();
        }
        for(let i=0; i<=ROWS; i++) {
            context.beginPath();
            context.moveTo(0, i);
            context.lineTo(COLS, i);
            context.stroke();
        }

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.beginPath();
                    const r = 0.15; 
                    const px = x + offset.x + 0.05;
                    const py = y + offset.y + 0.05;
                    const sz = 0.9;
                    context.roundRect(px, py, sz, sz, r);
                    context.fill();
                    
                    context.strokeStyle = 'rgba(255,255,255,0.7)';
                    context.lineWidth = 0.04;
                    context.stroke();
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
        player.score += 10;
        updateStats();
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 100; 
            rowCount *= 2;
        }
        updateStats();
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            updateStats();
            overlay.style.display = 'flex';
            cancelAnimationFrame(animationId);
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    let dropCounter = 0;
    let baseInterval = 1000;
    let dropInterval = 1000;
    let lastTime = 0;
    let animationId;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        draw();
        animationId = requestAnimationFrame(update);
    }

    function updateStats() {
        scoreElement.innerText = player.score;
        // 300점마다 레벨이 오르도록 수정!
        player.level = Math.floor(player.score / 300) + 1;
        levelElement.innerText = player.level;
        
        // 속도 계산: 레벨이 오를수록 100ms씩 빨라짐 (최소 150ms까지 제한)
        dropInterval = Math.max(150, baseInterval - (player.level - 1) * 100);
        
        updateCat();
    }

    function updateCat() {
        const score = player.score;
        const hearts = document.querySelectorAll('.heart');
        const catSvg = document.getElementById('cat-svg');

        // 점수에 따라 고양이가 조금씩 커져요
        let scale = 0.85 + (Math.min(score, 3000) / 3000) * 0.4;
        catSvg.style.transform = `scale(${scale})`;

        if (score >= 1500) {
            hearts.forEach(h => h.style.display = 'block');
        } else {
            hearts.forEach(h => h.style.display = 'none');
        }
    }

    const arena = createMatrix(COLS, ROWS);
    const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, level: 1 };

    document.getElementById('left').addEventListener('click', () => playerMove(-1));
    document.getElementById('right').addEventListener('click', () => playerMove(1));
    document.getElementById('rotate').addEventListener('click', () => playerRotate(1));
    document.getElementById('down').addEventListener('click', () => playerDrop());

    startBtn.addEventListener('click', () => {
        overlay.style.display = 'none';
        playerReset();
        updateStats();
        update();
    });

    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 38 || event.keyCode === 32) {
            event.preventDefault();
            playerRotate(1);
        }
    });

</script>
</body>
</html>
